<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieConverter Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #placeholder {
      color: #888888;
      font-family: "Meiryo UI", "Meiryo", sans-serif;
      font-size: 13px;
      text-align: center;
      line-height: 1.8;
      pointer-events: none;
    }

    #error-msg {
      display: none;
      color: #ff8080;
      font-family: "Meiryo UI", "Meiryo", sans-serif;
      font-size: 13px;
      text-align: center;
      line-height: 1.8;
      max-width: 80%;
      pointer-events: none;
    }

    #video {
      max-width: 100%;
      max-height: 100vh;
      display: none;
      background-color: #000;
    }

    /* 読み込み完了後・自動再生ブロック時に表示するオーバーレイ再生ボタン */
    #play-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.22);
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
    }

    #play-overlay-btn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.82);
      background: rgba(0, 0, 0, 0.52);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 4px;
    }

    #play-overlay-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>

  <div id="placeholder">
    MP4ファイルを選択すると<br>ここに動画が表示されます
  </div>

  <div id="error-msg"></div>

  <video id="video" preload="metadata"></video>

  <!-- 動画読み込み完了後に重なるオーバーレイ再生ボタン -->
  <div id="play-overlay">
    <button id="play-overlay-btn">&#9654;</button>
  </div>

  <script>
    'use strict';

    const video = document.getElementById('video');
    const placeholder = document.getElementById('placeholder');
    const errorMsg = document.getElementById('error-msg');
    const playOverlay = document.getElementById('play-overlay');
    let currentMethod = 'unknown'; // 現在の読み込み方式 (C#から渡される)

    function sendMsg(obj) {
      try {
        window.chrome.webview.postMessage(JSON.stringify(obj));
      } catch (err) {
        // WebView2 が未初期化の場合は無視
      }
    }

    function showPlayOverlay() {
      playOverlay.style.display = 'flex';
    }

    function hidePlayOverlay() {
      playOverlay.style.display = 'none';
    }

    // オーバーレイ再生ボタン: WebView2内のユーザージェスチャーとして play() を呼ぶ
    // これにより NotAllowedError を回避できる
    document.getElementById('play-overlay-btn').addEventListener('click', function () {
      hidePlayOverlay();
      video.play().catch(function (err) {
        sendMsg({ type: 'error', msg: err.toString(), method: currentMethod });
      });
    });

    // ── 動画イベント → C# へ通知 ──────────────────────────────────

    video.addEventListener('loadedmetadata', function () {
      placeholder.style.display = 'none';
      video.style.display = 'block';
      // 読み込み成功を通知し、オーバーレイボタンを表示して最初のユーザージェスチャーを促す
      showPlayOverlay();
      sendMsg({ type: 'loaded', d: video.duration, method: currentMethod });
    });

    video.addEventListener('timeupdate', function () {
      sendMsg({
        type: 'timeupdate',
        t: video.currentTime,
        d: video.duration
      });
    });

    video.addEventListener('play', function () {
      hidePlayOverlay();
      sendMsg({ type: 'playing' });
    });

    video.addEventListener('pause', function () {
      sendMsg({ type: 'paused' });
    });

    video.addEventListener('ended', function () {
      sendMsg({ type: 'ended' });
    });

    video.addEventListener('error', function () {
      var errCode = video.error ? video.error.code : 0;
      var errMsg = '不明なエラー';
      if (video.error) {
        switch (errCode) {
          case 1: errMsg = '読み込みが中断されました'; break;
          case 2: errMsg = 'ファイルの読み取りに失敗しました'; break;
          case 3: errMsg = 'デコードに失敗しました（ファイルが破損しているか、非対応のコーデックです）'; break;
          case 4: errMsg = 'プレビューで再生できませんでした'; break;
        }
      }
      hidePlayOverlay();
      placeholder.style.display = 'none';
      video.style.display = 'none';
      errorMsg.style.display = 'block';
      if (errCode === 4) {
        errorMsg.innerHTML =
          '⚠ ' + errMsg + '<br>' +
          '<span style="font-size:11px">Microsoft Edgeで再生できる動画でも、この画面では再生できない場合があります。</span><br><br>' +
          '<span style="font-size:11px; text-align:left; display:block">' +
          '・別のMP4で試してみてください<br>' +
          '・管理者またはDX担当へご相談ください' +
          '</span>';
      } else {
        errorMsg.innerHTML = '⚠ 動画を読み込めませんでした<br><span style="font-size:11px">' + errMsg + '</span>';
      }
      sendMsg({ type: 'error', msg: errMsg, method: currentMethod });
    });

    // ── C# からのコマンド受信 ─────────────────────────────────────

    window.chrome.webview.addEventListener('message', function (event) {
      var msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }

      switch (msg.cmd) {
        case 'load':
          currentMethod = msg.method || 'unknown';
          // 表示状態をリセット
          errorMsg.style.display = 'none';
          video.style.display = 'none';
          hidePlayOverlay();
          placeholder.style.display = 'block';
          placeholder.innerHTML = '読み込み中...';
          video.src = msg.src;
          video.load();
          break;

        case 'play':
          video.play().catch(function (err) {
            if (err.name === 'NotAllowedError') {
              // 自動再生制限: 読み込みは成功しているが WebView2 内のユーザージェスチャーが必要
              // → エラーではなく play-blocked として通知し、オーバーレイボタンを表示する
              showPlayOverlay();
              sendMsg({ type: 'play-blocked', msg: err.toString(), method: currentMethod });
            } else {
              sendMsg({ type: 'error', msg: err.toString(), method: currentMethod });
            }
          });
          break;

        case 'pause':
          video.pause();
          break;

        case 'seek':
          if (typeof msg.t === 'number' && isFinite(msg.t)) {
            var duration = video.duration;
            if (isFinite(duration) && duration > 0) {
              video.currentTime = Math.max(0, Math.min(msg.t, duration));
            }
          }
          break;

        case 'volume':
          if (typeof msg.v === 'number') {
            video.volume = Math.max(0, Math.min(1, msg.v));
          }
          break;

        case 'mute':
          video.muted = !!msg.on;
          break;
      }
    });
  </script>

</body>
</html>
